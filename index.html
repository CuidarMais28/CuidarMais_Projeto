<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuidar+</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Grandstander:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="img_logo">
            <img src="Imagens/logo_cuidar+.png" alt="" class="logo">
        </div>

        <nav class="cabecalho">
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre Nós</a></li>
                <li><a href="#">Depoimentos</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Contato</a></li>
                <li class="material-symbols-outlined">light_mode</li>
            </ul>
        </nav>
    </header>


    <section class="section_incio">
        <div class="section_primeira_parte">
            <h1>Cuidar+</h1>
            <p>Conectando quem deseja ajudar com quem precisa de apoio na jornada contra o câncer.</p>
            <div class="botoes_container">
                <button>Oferecer Apoio</button>
                <button>Receber Apoio</button>
            </div>
        </div>

        <div class="section_segunda_parte">
            <img src="Imagens/Vector.png" alt="">
            <div class="setas_container">
                <h1 class="material-symbols-outlined">arrow_forward</h1>
                <h1 class="material-symbols-outlined">arrow_back</h1>
            </div>
        </div>


    </section>

</html>
